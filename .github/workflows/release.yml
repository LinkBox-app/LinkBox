name: Release Desktop Apps

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to publish, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  publish-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            bundles: "--bundles dmg"
          - platform: ubuntu-22.04
            bundles: "--bundles appimage,deb"
          - platform: windows-latest
            bundles: "--bundles nsis,msi"

    runs-on: ${{ matrix.platform }}

    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            web/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: server/requirements.txt

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install root dependencies
        run: npm ci

      - name: Sync release version from tag
        shell: bash
        run: |
          node -e "
          const fs = require('fs');
          const tag = process.env.RELEASE_TAG;
          if (!/^v\d+\.\d+\.\d+(?:-[0-9A-Za-z.-]+)?(?:\+[0-9A-Za-z.-]+)?$/.test(tag)) {
            throw new Error('Release tag must look like v0.1.0, received: ' + tag);
          }
          const version = tag.slice(1);
          const files = ['package.json', 'src-tauri/tauri.conf.json'];
          for (const file of files) {
            const json = JSON.parse(fs.readFileSync(file, 'utf8'));
            json.version = version;
            fs.writeFileSync(file, JSON.stringify(json, null, 2) + '\n');
          }
          console.log('Synced release version to', version);
          "

      - name: Install web dependencies
        run: npm ci
        working-directory: web

      - name: Install Python build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller -r server/requirements.txt

      - name: Build Python sidecar
        run: python scripts/build_sidecar.py 
        
      - name: Build and publish desktop bundles
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: .
          tauriScript: npm run tauri
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: LinkBox ${{ env.RELEASE_TAG }}
          releaseBody: |
            Automated desktop builds for macOS, Windows, and Linux.
          generateReleaseNotes: true
          releaseDraft: false
          prerelease: false
          uploadWorkflowArtifacts: true
          args: ${{ matrix.bundles }}
