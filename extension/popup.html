<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkBox Collector</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="container">
      <header class="header">
        <h1>LinkBox 收藏器</h1>
        <p id="server-info" class="server-info"></p>
      </header>

      <section id="message" class="message hidden"></section>

      <section id="auth-section" class="card">
        <form id="auth-form">
          <h2 id="auth-title">登录</h2>
          <div class="field">
            <label for="auth-username">用户名</label>
            <input id="auth-username" name="username" type="text" autocomplete="username" required maxlength="50" />
          </div>
          <div class="field">
            <label for="auth-password">密码</label>
            <input id="auth-password" name="password" type="password" autocomplete="current-password" required minlength="6" maxlength="100" />
          </div>
          <div class="field hidden" id="confirm-password-wrapper">
            <label for="auth-confirm-password">确认密码</label>
            <input id="auth-confirm-password" name="confirmPassword" type="password" autocomplete="new-password" minlength="6" maxlength="100" />
          </div>
          <button id="auth-submit" type="submit" class="primary">登录</button>
          <button id="auth-toggle" type="button" class="link-button">没有账号？注册</button>
        </form>
      </section>

      <section id="main-section" class="card hidden">
        <p id="user-info" class="user-info"></p>
        <div class="field">
          <label>当前页面</label>
          <div id="current-title" class="readonly-text"></div>
          <div id="current-url" class="readonly-text url"></div>
        </div>

        <div class="field">
          <label for="note-input">备注（可选，用于生成摘要）</label>
          <textarea id="note-input" rows="2" placeholder="告诉 LinkBox 你想关注的要点"></textarea>
        </div>

        <div class="actions">
          <button id="preview-button" type="button">生成预览</button>
          <button id="save-button" type="button" class="primary">保存到 LinkBox</button>
        </div>

        <hr class="divider">

        <div class="field">
          <label for="title-input">标题</label>
          <input id="title-input" type="text" maxlength="500" placeholder="填写或生成标题" />
        </div>

        <div class="field">
          <label for="digest-input">摘要</label>
          <textarea id="digest-input" rows="3" placeholder="填写或生成摘要"></textarea>
        </div>

        <div class="field">
          <label for="tag-input">标签</label>
          <div class="tag-input-row">
            <input id="tag-input" type="text" placeholder="输入标签后回车" />
            <button id="add-tag-button" type="button">添加</button>
          </div>
          <div id="selected-tags" class="tag-chip-container"></div>
          <details id="tag-suggestions-wrapper" class="tag-suggestions">
            <summary>我的标签</summary>
            <div id="tag-suggestions" class="tag-chip-container suggestions"></div>
          </details>
        </div>

        <div class="footer-actions">
          <button id="refresh-tags" type="button" class="secondary">刷新标签</button>
          <button id="logout-button" type="button" class="link-button">退出登录</button>
        </div>
      </section>

      <footer class="footer">
        <small>使用选项页配置服务端地址。</small>
      </footer>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
